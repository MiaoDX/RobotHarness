<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F9FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#15304B" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 46px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #12263A; }
      .subtitle { font: 500 22px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #486581; }
      .card-title { font: 700 26px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .label { font: 700 20px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #243B53; }
      .body { font: 500 18px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #486581; }
      .tiny { font: 600 16px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #102A43; }
      .badge { font: 700 18px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #7C2D12; }
      .metric { font: 700 24px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>

  <text x="84" y="96" class="title">Roboharness v0.3.0 — Trust Compression Wedge</text>
  <text x="84" y="134" class="subtitle">把 2–3 小时无人值守的 agent 运行，压缩成工程师 3 分钟最终审批</text>

  <g filter="url(#shadow)">
    <rect x="72" y="178" width="404" height="286" rx="28" fill="url(#card)"/>
    <text x="108" y="228" class="card-title">旧模式：人盯 agent 跑</text>
    <text x="108" y="274" class="label">问题定义</text>
    <text x="108" y="306" class="body">agent 能跑，但工程师不敢离开屏幕。</text>
    <text x="108" y="350" class="label">典型流程</text>
    <text x="108" y="382" class="body">写 prompt → 跑仿真 → 挨个看 8 个场景 →</text>
    <text x="108" y="412" class="body">人肉找偷换行为 → 返工重跑</text>
    <text x="108" y="456" class="label">结果</text>
    <text x="108" y="488" class="body">agent 跑 6 小时 = 人盯 6 小时</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="518" y="178" width="404" height="286" rx="28" fill="url(#card)"/>
    <text x="554" y="228" class="card-title">新模式：prompt → contract → run</text>
    <rect x="554" y="258" width="112" height="44" rx="14" fill="#E0FBF6"/>
    <text x="576" y="286" class="tiny">prompt</text>
    <rect x="698" y="258" width="124" height="44" rx="14" fill="#D9EAFB"/>
    <text x="724" y="286" class="tiny">contract</text>
    <rect x="854" y="258" width="68" height="44" rx="14" fill="#FEEBC8"/>
    <text x="874" y="286" class="tiny">run</text>
    <path d="M666 280H694" stroke="#486581" stroke-width="4" stroke-linecap="round"/>
    <path d="M822 280H850" stroke="#486581" stroke-width="4" stroke-linecap="round"/>
    <text x="554" y="344" class="label">规则约束</text>
    <text x="554" y="376" class="body">metric_gate / visual_goal / anti_goal</text>
    <text x="554" y="420" class="label">四态判定</text>
    <text x="554" y="452" class="body">PASS / FAIL / AMBIGUOUS / CONTRACT_INVALID</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="964" y="178" width="404" height="286" rx="28" fill="url(#card)"/>
    <text x="1000" y="228" class="card-title">工程师只看 surfaced cases</text>
    <rect x="1000" y="262" width="332" height="164" rx="20" fill="#F8FAFC" stroke="#D9E2EC" stroke-width="2"/>
    <text x="1024" y="300" class="label">Run Decision: REVIEW REQUIRED</text>
    <text x="1024" y="334" class="body">8 cases / 3 surfaced / 5 unchanged</text>
    <text x="1024" y="374" class="body">⚠ scene_03  AMBIGUOUS</text>
    <text x="1024" y="406" class="body">✗ scene_07  FAIL</text>
    <text x="1024" y="438" class="body">⚠ scene_04  MIGRATION</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="514" width="632" height="286" rx="28" fill="url(#card)"/>
    <text x="108" y="564" class="card-title">可复核证据包</text>
    <text x="108" y="612" class="badge">contract.json</text>
    <text x="304" y="612" class="badge">alarms.json</text>
    <text x="492" y="612" class="badge">report.html</text>
    <text x="108" y="660" class="badge">approval_report.json</text>
    <text x="392" y="660" class="badge">phase_manifest.json</text>
    <text x="108" y="716" class="body">评委或工程师要的不是“感觉能跑”，而是：</text>
    <text x="108" y="748" class="body">每条结论都能落到 phase、view、规则和证据文件。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="746" y="514" width="622" height="286" rx="28" fill="url(#card)"/>
    <text x="782" y="564" class="card-title">落地价值</text>
    <text x="782" y="614" class="label">典型收益</text>
    <text x="782" y="648" class="metric">6h human watch → 3 min approval</text>
    <text x="782" y="696" class="label">年度量级</text>
    <text x="782" y="730" class="metric">≈ 1.4 FTE saved / team / year</text>
    <text x="782" y="772" class="body">ROI 不再跟 agent 总产出线性相关，只跟真正有风险的 case 数相关。</text>
  </g>
</svg>
